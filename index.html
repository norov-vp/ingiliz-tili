<title>Ingiliz Tili</title>

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f7fb;
}

/* ================= MENU ================= */
#menu{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.menu-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
    max-width:700px;
    width:100%;
}

.card{
    background:linear-gradient(135deg,#ffffff,#f1f5f9);
    border-radius:16px;
    height:120px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.25s;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#3b82f6,#22c55e);
    opacity:0;
    transition:0.3s;
}

.card:hover::before{
    opacity:0.15;
}

.card:hover{
    transform:translateY(-5px) scale(1.03);
}

.icon{
    font-size:28px;
    margin-bottom:6px;
}

.card span{
    font-weight:bold;
    font-size:14px;
}

/* ================= APP ================= */
#app{
    display:none;
}

/* TOPBAR */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    z-index:100;
}

.btn{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.home{
    background:#ef4444;
    color:white;
}

.resultBtn{
    background:#22c55e;
    color:white;
}

/* ================= CONTAINER ================= */
.container{
    margin-top:60px;
    display:flex;
    flex-wrap:wrap;
}

/* GRID NUMBERS */
.grid{
    flex:1;
    max-width:300px;
    height:calc(100vh - 120px);
    overflow:auto;
    background:white;
    padding:10px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
}

.box{
    aspect-ratio:1/1;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:8px;
    border:1px solid #ddd;
    cursor:pointer;
    font-size:12px;
}

.active{
    background:#3b82f6;
    color:white;
}

.answered{
    background:#22c55e;
    color:white;
}

/* ================= QUESTION ================= */
.main{
    flex:3;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

.qbox{
    width:100%;
    max-width:550px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
    text-align:center;
}

.option{
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    background:#f1f5f9;
    cursor:pointer;
    transition:0.2s;
}

.option:hover{
    background:#dbeafe;
}

.selected{
    background:#60a5fa;
    color:white;
}

/* ================= RESULT ================= */
#resultPage{
    display:none;
    padding:20px;
    text-align:center;
}

.resultBox{
    background:white;
    margin:10px auto;
    padding:15px;
    border-radius:12px;
    max-width:600px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.correct{color:#16a34a;font-weight:bold}
.wrong{color:#dc2626;font-weight:bold}

/* ================= RESPONSIVE ================= */
@media (max-width:768px){
    .menu-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .container{
        flex-direction:column;
    }

    .grid{
        max-width:100%;
        height:auto;
        grid-template-columns:repeat(8,1fr);
    }
}

</style>
</head>

/* ================= VARS ================= */
let selected=[];
let answers=[];
let current=0;

/* ================= START ================= */
function start(id){

    document.getElementById("menu").style.display="none";
    document.getElementById("app").style.display="block";

    answers=[];
    current=0;

    if(id<8){
        let start=(id-1)*50;
        selected=questions.slice(start,start+50);
    }else{
        selected=questions.sort(()=>Math.random()-0.5).slice(0,50);
    }

    renderGrid();
}

/* ================= GRID ================= */
function renderGrid(){

    let g=document.getElementById("grid");
    g.innerHTML="";

    for(let i=0;i<50;i++){

        let b=document.createElement("div");
        b.className="box";

        if(i===current) b.classList.add("active");
        if(answers[i]!=null) b.classList.add("answered");

        b.innerText=i+1;
        b.onclick=()=>openQ(i);

        g.appendChild(b);
    }
}

/* ================= QUESTION ================= */
function openQ(i){

    current=i;
    let q=selected[i];

    document.getElementById("qbox").innerHTML=`
        <h3>${q.q}</h3>
        ${q.options.map((o,j)=>`
            <div class="option ${answers[i]===j?'selected':''}"
            onclick="select(${i},${j})">${o}</div>
        `).join("")}
    `;

    renderGrid();
}

/* ================= SELECT ================= */
function select(i,j){
    answers[i]=j;
    openQ(i);
}

/* ================= HOME ================= */
function home(){
    location.reload();
}

/* ================= RESULT ================= */
function showResult(){

    let score=0;
    let html="";

    selected.forEach((q,i)=>{

        let ok = answers[i]===q.correct[0];

        if(ok) score++;

        html+=`
        <div class="resultBox">
            <h4>${i+1}. ${q.q}</h4>
            <p class="${ok?'correct':'wrong'}">
                Sen: ${q.options[answers[i]] || "—"} <br>
                To‘g‘ri: ${q.options[q.correct[0]]}
            </p>
        </div>`;
    });

    document.getElementById("app").style.display="none";
    document.getElementById("resultPage").style.display="block";

    document.getElementById("resultPage").innerHTML=`
        <h2>🏆 NATIJA</h2>
        <h1>${score}/50</h1>
        <h3>${Math.round(score*100/50)}%</h3>
        <button class="btn home" onclick="home()">🏠 Orqaga</button>
        ${html}
    `;
}
